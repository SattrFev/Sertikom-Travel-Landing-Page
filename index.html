<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="img/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExproTravel</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Unbounded:wght@200..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <nav id="nav">
      <a class="logo" href="#">ExproTravel</a>
      <ul>
        <li>
          <div class="search-box">
            <input type="text" placeholder="Search..." />
            <button><i class="fas fa-search"></i></button>
          </div>
        </li>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Popular</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <section id="hero">
      <div class="cta">
        <h1>Good Morning!</h1>
        <p>Explore beautiful places in the world with ExproTravel</p>
        <div class="cta-book">
          <div class="parameters">
            <div class="location">
              <i class="fa-regular fa-compass"></i>
              <div class="desc">
                <h3>Location</h3>
                <p>Add destination</p>
              </div>
            </div>
            <div class="checkin">
              <i class="fa-regular fa-calendar"></i>
              <div class="desc">
                <h3>Check in</h3>
                <p>Add dates</p>
              </div>
            </div>
            <div class="checkout">
              <i class="fa-regular fa-calendar"></i>
              <div class="desc">
                <h3>Check out</h3>
                <p>Add dates</p>
              </div>
            </div>
            <div class="guests">
              <i class="fa-regular fa-user"></i>
              <div class="desc">
                <h3>Guests</h3>
                <p>Add guests</p>
              </div>
            </div>
          </div>
          <button class="search-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
      </div>
    </section>
  </body>
</html>
